{% load static %}<!DOCTYPE html>
<html lang="{{ page.lang | slice:':2' | default:'en' }}">

<head>
  <title>{{ page.title|striptags }}GNU Dico Web</title>
  <meta http-equiv="content-type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="keywords" content="gnu dico web search interface, dicoweb, dictionaries, dict protocol">
  <meta name="description" content="GNU Dico WebSearch Interface">
  <meta name="robots" content="{{ page.robots }}">
  <link rel="icon" type="image/png" href="{% static 'images/gnu-head-mini.png' %}">
  <link rel="stylesheet" type="text/css" href="{% static 'dicoweb.css' %}">
  <link rel="search" type="application/opensearchdescription+xml" title="GNU Dico WebSearch" href="{% url 'opensearch' %}">
  <script type="text/javascript" src="{% static 'dicoweb.js' %}"></script>
</head>

<body>
<div id="wrap">
  <a href="{% url 'index' %}" accesskey="1">
    <div id="logo">
      <h1>GNU Dico</h1>
      <picture>
        <source srcset="{% static 'images/gnu-head-sm-dark.webp' %}" type="image/webp"
                media="(prefers-color-scheme: dark)" width="129" height="123">
        <source srcset="{% static 'images/gnu-head-sm.webp' %}" type="image/webp" width="129" height="123">
        <img src="{% static 'images/gnu-head-sm.png' %}" width="129" height="123" alt="GNU">
      </picture>
    </div>
  </a>
  <div id="main">
    {% block search %}{% endblock %}
  </div>
</div><!-- /wrap -->
<div class="clear"></div>

{% block results %}{% endblock %}

<div id="footer">
  <a href="https://www.gnu.org/software/dico/">GNU Dico</a> Web interface
  <div class="copyright">&copy; 2008-{% now "Y" %} GNU Dico Team</div>
</div>

</body>
</html>
